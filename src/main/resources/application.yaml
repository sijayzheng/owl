server:
  # 服务器的HTTP端口，默认为8080
  port: 8080
  servlet:
    # 应用的访问路径
    context-path: /

spring:
  application:
    name: owl
  profiles:
    active: dev
  main:
    banner-mode: off
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/owl
    username: root
    password: root
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      idle-timeout: 30000
      max-lifetime: 120000
      keepalive-time: 30000
      connection-timeout: 30000
      connection-test-query: SELECT 1
      auto-commit: true
      pool-name: HikariCP
  # 文件上传
  servlet:
    multipart:
      # 单个文件大小
      max-file-size: 10MB
      # 设置总上传的文件大小
      max-request-size: 20MB
  mvc:
    # 设置静态资源路径 防止所有请求都去查静态资源
    static-path-pattern: /static/**
    format:
      date-time: yyyy-MM-dd HH:mm:ss
  jackson:
    deserialization:
      fail-on-unknown-properties: false
    serialization:
      fail-on-empty-beans: false
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null
  freemarker:
    template-loader-path: classpath:/templates/
    charset: UTF-8
    cache: false
  threads:
    virtual:
      enabled: true
  task:
    execution:
      # 从 springboot 3.5 开始 spring自带线程池
      # 不再需要 AsyncConfig与ThreadPoolConfig 可直接注入线程池使用
      thread-name-prefix: async-
      # 由spring自己初始化线程池
      mode: force

logging:
  charset:
    console: utf-8
  pattern:
    console: '%red(%d{HH:mm:ss}) %green([%thread]) %highlight(%-5level) %boldMagenta(%logger%n) - %msg%n'
  level:
    root: info

mybatis-flex:
  global-config:
    logic-delete-column: deleted
    deleted-value-of-logic-delete: true
    normal-value-of-logic-delete: false
    print-banner: false
    key-config:
      key-type: auto
  mapper-locations: classpath*:/mapper/**/*Mapper.xml

easy-trans:
  #启用redis缓存 如果不用redis请设置为false
  is-enable-redis: false
  #启用全局翻译(拦截所有responseBody进行自动翻译)，如果对于性能要求很高可关闭此配置在方法上使用注解翻译
  is-enable-global: true
  #启用平铺模式 手动翻译无效
  is-enable-tile: true
  #字典缓存放到redis 微服务模式请开启
  dict-use-redis: false
  #使用@RpcTrans来标记哪些类可以进行RPC翻译，默认为关闭，多团队协作推荐开启
  is-enable-custom-rpc: false
  # ruoyi相关的框架请开启
  is-enable-map-result: false
  # 反向翻译数据库类型 mysql
  db-type: mysql
  # Mybatis-plus 为 3.5.3.2版本以上的3.x 版本请设置为true
  mp-new: false


decorator:
  datasource:
    p6spy:
      log-format: '%(sqlSingleLine)'

gen:
  #作者
  author: sijay
  #包路径
  package-name: cn.sijay.owl

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
  disable-i18n: false
  pre-loading-locales: CN
  paths-to-exclude:
    - /actuator/**

sa-token:
  # 允许动态设置 token 有效期
  dynamic-active-timeout: true
  # 允许从 请求参数 读取 token
  is-read-body: true
  # 允许从 header 读取 token
  is-read-header: true
  # 关闭 cookie 鉴权 从根源杜绝 csrf 漏洞风险
  is-read-cookie: false
  # token前缀
  token-prefix: 'Bearer'
  # token名称 (同时也是cookie名称)
  token-name: Authorization
  # 是否允许同一账号并发登录 (为true时允许一起登录, 为false时新登录挤掉旧登录)
  is-concurrent: true
  # 在多人登录同一账号时，是否共用一个token (为true时所有登录共用一个token, 为false时每次登录新建一个token)
  is-share: false
  is-print: false
  active-timeout: -1
  timeout: -1